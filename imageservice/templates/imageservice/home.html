{% load static %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Service</title>

    <style>
        body {
            background-image: url("{% static 'images/background.jpeg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;

            color: black;
            text-shadow: 1px 1px 3px black;
        }

        a {
            color: black;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>Image Service</h1>

    <ul>
        <li><a href="{% url 'upload_image' %}">Загрузить изображение</a></li>
        <li><a href="{% url 'image_list' %}">Список изображений</a></li>
        <li><a href="{% url 'gallery' %}">Галерея</a></li>
        <li><a href="/admin/">Админка</a></li>
    </ul>
</body>
</html>
