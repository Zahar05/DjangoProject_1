{% load static %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Service</title>

    <style>
        body {
            /* Переключаем на темный фон */
            background-color: #121212;
            min-height: 100vh;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1, h2 {
            color: #ffffff;
        }

        a {
            color: #61afef;
            font-size: 20px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        form {
            margin: 20px 0;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            max-width: 300px;
            border: 1px solid #333;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            color: #ffffff;
        }

        input::placeholder {
            color: #888;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            background-color: #61afef;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            background-color: #4b9cd3;
        }

        hr {
            border-color: #333;
            margin: 20px 0;
        }
    </style>
</head>

<body>

    <h1>Сервис хранения изображений</h1>

    <ul>
        <li><a href="{% url 'upload_image' %}">Загрузить изображение</a></li>
        <li><a href="{% url 'image_list' %}">Список изображений</a></li>
        <li><a href="/admin/">Админка</a></li>
    </ul>

    <hr>

    <p style="color: #4caf50;">{{ message }}</p>

    <!-- JWT AUTH BLOCK -->
    <h2>Регистрация (JWT)</h2>

    <form id="registerForm">
        <input type="text" id="reg_username" placeholder="username">
        <input type="password" id="reg_password" placeholder="password">
        <button type="submit">Register</button>
    </form>

    <h2>Вход (JWT)</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="username">
        <input type="password" id="password" placeholder="password">
        <button type="submit">Login</button>
    </form>

    <script>
        // LOGIN (JWT)
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/api/token/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            console.log("LOGIN JWT:", data);

            if (data.access) {
                localStorage.setItem("access", data.access);
                localStorage.setItem("refresh", data.refresh);
                alert("Login successful (JWT)");
            } else {
                alert("Login failed");
            }
        });


        // REGISTER (API)
        document.getElementById("registerForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const username = document.getElementById("reg_username").value;
            const password = document.getElementById("reg_password").value;

            const response = await fetch("/api/register/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            console.log("REGISTER:", data);

            if (response.ok) {
                alert("User created successfully");
            } else {
                alert("Registration error");
            }
        });
    </script>

</body>
</html>
