<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузить изображение</title>
    <style>
        body {
            background-color: #121212;
            min-height: 100vh;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
        }

        a {
            color: #61afef;
            font-size: 18px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        hr {
            border-color: #333;
            margin: 20px 0;
        }

        form {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            border: 1px solid #333;
        }

        /* Стилизация элементов формы Django (input, textarea, select) */
        form p {
            margin-bottom: 15px;
        }

        form label {
            display: block;
            margin-bottom: 5px;
            color: #bbb;
            font-size: 14px;
        }

        input[type="text"], input[type="file"], textarea, select {
            display: block;
            margin: 5px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            color: #ffffff;
        }

        /* Специфика для поля выбора файла, чтобы кнопка "Обзор" тоже выглядела аккуратно */
        input[type="file"] {
            background-color: transparent;
            border: none;
            padding: 5px 0;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            background-color: #61afef;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            font-size: 16px;
        }

        button:hover {
            background-color: #4b9cd3;
        }
    </style>
</head>
<body>
    <h1>Загрузить изображение</h1>

    <a href="{% url 'home' %}">Главная</a>
    <hr>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Загрузить</button>
    </form>
</body>
</html>
